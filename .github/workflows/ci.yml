# CI gates: rustfmt, clippy (warnings are errors), cargo test.
#
# The libjami static prefix is the pre-built CI tarball published on
# carrier's releases (libjami-<sha>, ~30s to fetch); libcarrier.a is built
# from the carrier submodule against it. macos-14 is arm64, matching the
# published arm64-apple-darwin tarball.
#
# Integration tests that read the private sibling `radios` checkout
# (the messenger/messenger2/theme-authoring pipeline smokes) are excluded
# here — they run in the full workspace via `make test-antenna`. The
# exclusion is computed dynamically (any tests/*.rs containing a "radios/
# path literal), so new test files sort themselves into the right bucket.

name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: Swatinem/rust-cache@v2

      - name: Fetch pre-built libjami prefix
        run: |
          command -v zstd >/dev/null || brew install zstd
          make -C third_party/carrier libjami-fetch

      # antenna/build.rs links the pjsip/srtp/yuv contribs by their
      # kernel-versioned names (lib<name>-aarch64-apple-darwin$(uname -r).a),
      # but the published prefix stages kernel-version-free names so one
      # tarball serves every macOS host. Bridge with symlinks.
      - name: Add kernel-versioned contrib archive names
        run: |
          sha="$(tr -d '[:space:]' < third_party/carrier/JAMI_VERSION)"
          cd "${XDG_CACHE_HOME:-$HOME/.cache}/resonator/libjami/$sha/lib"
          for f in lib*-apple-darwin.a; do
            ln -sf "$f" "${f%.a}$(uname -r).a"
          done

      # Builds libcarrier.a (what antenna links) and carrier-cli — the CLI
      # link doubles as a fast validation of the fetched libjami prefix
      # before the long cargo build starts.
      - name: Build libcarrier
        run: make -C third_party/carrier

      - name: rustfmt
        run: cargo fmt --check

      - name: clippy
        run: cargo clippy --all-targets -- -D warnings

      # Step-bounded: ffi_account_import can hang forever in libjami fini
      # (ISSUE-131); a wedged run should fail here, not eat the job timeout.
      - name: cargo test
        timeout-minutes: 25
        run: |
          targets=(--lib --bins)
          skipped=""
          for f in tests/*.rs; do
            name="$(basename "$f" .rs)"
            if grep -q '"radios/' "$f"; then
              skipped="$skipped $name"
            else
              targets+=(--test "$name")
            fi
          done
          echo "Excluded (need the private radios sibling):$skipped"
          cargo test "${targets[@]}"
          cargo test --doc
